<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 512 512" fill="none">
  <!-- Minimalist High-Contrast Favicon version -->
  <rect width="512" height="512" rx="128" fill="#090514"/>
  
  <g transform="translate(100, 100) scale(3.12)">
    <!-- Left Wing (S Curve / Book Page) -->
    <path d="M46 16 C30 16, 16 30, 16 48 C16 70, 36 76, 36 96 C36 104, 30 112, 16 112 C10 112, 6 108, 6 108" stroke="#8F5CFF" stroke-width="12" stroke-linecap="round" fill="none"/>
    
    <!-- Right Wing (S Curve / Book Page) -->
    <path d="M54 16 C70 16, 84 30, 84 48 C84 70, 64 76, 64 96 C64 104, 70 112, 84 112 C90 112, 94 108, 94 108" stroke="#3B82F6" stroke-width="12" stroke-linecap="round" fill="none"/>
    
    <!-- Central AI / OS core Node -->
    <circle cx="50" cy="56" r="10" fill="#FFFFFF" filter="url(#glow)"/>
    <circle cx="50" cy="56" r="6" fill="#3B82F6"/>
    
    <!-- Connected Technology Nodes -->
    <circle cx="50" cy="20" r="4" fill="#8F5CFF"/>
    <line x1="50" y1="20" x2="50" y2="46" stroke="#8F5CFF" stroke-width="2" stroke-dasharray="2 2"/>
    
    <circle cx="50" cy="92" r="4" fill="#3B82F6"/>
    <line x1="50" y1="66" x2="50" y2="92" stroke="#3B82F6" stroke-width="2" stroke-dasharray="2 2"/>
  </g>
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

</svg>